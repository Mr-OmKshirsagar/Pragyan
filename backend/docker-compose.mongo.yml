version: '3.8'
services:
  mongo_rs:
    image: mongo:6.0
    container_name: pragyan_mongo_rs
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 12
volumes:
  mongo_data:
